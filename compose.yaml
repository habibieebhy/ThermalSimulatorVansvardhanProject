services:
  mattress-lab-ui:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./artifacts:/app/artifacts
    restart: unless-stopped

  mattress-lab-api:
    build: .
    command: ["uvicorn", "mattress_intelligence.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./artifacts:/app/artifacts
    restart: unless-stopped
